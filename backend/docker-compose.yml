version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zcheck
      POSTGRES_USER: zcheck
      POSTGRES_PASSWORD: zcheck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  django:
    build:
      context: .
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 zcheck.asgi:application
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=zcheck
      - DB_USER=zcheck
      - DB_PASSWORD=zcheck
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost 127.0.0.1 ${DOMAIN}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000 https://${DOMAIN}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      # Give Django access to Docker socket so it can spin up runner containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A zcheck worker --loglevel=info --concurrency=4
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=zcheck
      - DB_USER=zcheck
      - DB_PASSWORD=zcheck
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - django
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/static
      - media_files:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
