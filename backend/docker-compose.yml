services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zcheck
      POSTGRES_USER: zcheck
      POSTGRES_PASSWORD: zcheck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --timeout 0 --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 zcheck.asgi:application"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-changeme-set-in-env}
      - DB_HOST=db
      - DB_NAME=zcheck
      - DB_USER=zcheck
      - DB_PASSWORD=zcheck
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost 127.0.0.1 ${DOMAIN:-localhost}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000 https://${DOMAIN:-localhost}
      - HOST_APP_DIR=${PWD}
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A zcheck worker --loglevel=info --concurrency=4
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-changeme-set-in-env}
      - DB_HOST=db
      - DB_NAME=zcheck
      - DB_USER=zcheck
      - DB_PASSWORD=zcheck
      - REDIS_URL=redis://redis:6379/0
      - HOST_APP_DIR=${PWD}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/static
      - media_files:/media
    ports:
      - "80:80"
    depends_on:
      - django

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  go_build_cache: